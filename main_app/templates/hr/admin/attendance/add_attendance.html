<div id="addAttendanceModal"
     class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">

  <div class="bg-gray-900 rounded-2xl w-full max-w-2xl p-6 relative border border-gray-700">

    <!-- Close Button -->
    <button type="button"
            id="closeAddAttendanceModal"
            class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl">
      &times;
    </button>

    <h2 class="text-2xl font-semibold text-blue-400 mb-4 text-center">
      Add Manual Attendance
    </h2>

    <form action="{{ url_for('hr_admin_bp.add_manual_attendance') }}"
          method="POST"
          class="space-y-4">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <!-- Employee -->
        <div>
          <label class="block text-gray-400">Employee</label>
          <select name="employee_id"
                  required
                  class="w-full px-3 py-2 rounded-lg bg-gray-700 text-gray-200">

            <option value="">Select Employee</option>

            {% for emp in employees %}
              <option value="{{ emp.id }}">
                {{ emp.get_full_name() }}
              </option>
            {% endfor %}

          </select>
        </div>

        <!-- Date -->
        <div>
          <label class="block text-gray-400">Date</label>
          <input type="date"
                 name="date"
                 required
                 class="w-full px-3 py-2 rounded-lg bg-gray-700 text-gray-200">
        </div>

        <!-- Time In -->
        <div>
          <label class="block text-gray-400">Time In</label>
          <input type="time"
                 name="time_in"
                 class="w-full px-3 py-2 rounded-lg bg-gray-700 text-gray-200">
        </div>

        <!-- Time Out -->
        <div>
          <label class="block text-gray-400">Time Out</label>
          <input type="time"
                 name="time_out"
                 class="w-full px-3 py-2 rounded-lg bg-gray-700 text-gray-200">
        </div>

        <!-- Status -->
        <div>
          <label class="block text-gray-400">Status</label>
          <select name="status"
                  class="w-full px-3 py-2 rounded-lg bg-gray-700 text-gray-200">

            <option value="Present">Present</option>
            <option value="Late">Late</option>
            <option value="Absent">Absent</option>

          </select>
        </div>

        <!-- Remarks -->
        <div class="md:col-span-2">
          <label class="block text-gray-400">Remarks</label>
          <textarea name="remarks"
                    class="w-full px-3 py-2 rounded-lg bg-gray-700 text-gray-200"></textarea>
        </div>

      </div>

      <!-- Buttons -->
      <div class="flex justify-end gap-2 mt-4">

        <button type="button"
                id="cancelAddAttendance"
                class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-xl">
          Cancel
        </button>

        <button type="submit"
                class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl">
          Save Attendance
        </button>

      </div>

    </form>

  </div>
</div>
