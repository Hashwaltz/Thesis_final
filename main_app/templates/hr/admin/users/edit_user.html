<div id="editUserModal"
class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

<div class="bg-gray-900 p-6 rounded-xl w-full max-w-md">

<h2 class="text-lg font-bold text-blue-400 mb-4">Edit User</h2>

<form id="editUserFormModal">

<input type="hidden" name="email">

<div class="mb-4">
<label class="text-gray-400 text-sm">Role</label>
<select name="role" class="w-full bg-gray-800 p-2 rounded">
<option value="">Select Role</option>
<option value="admin">HR Admin</option>
<option value="officer">HR Officer</option>
<option value="leave_officer">Leave Officer</option>
<option value="employee">Employee</option>
<option value="payroll_admin">Payroll Admin</option>
<option value="payroll_staff">Payroll Staff</option>
</select>
</div>

<div id="departmentField" class="hidden mb-4">
<label class="text-gray-400 text-sm">Department</label>
<select name="department_id" class="w-full bg-gray-800 p-2 rounded">
<option value="">Select Department</option>
{% for dept in departments %}
<option value="{{ dept.id }}">{{ dept.name }}</option>
{% endfor %}
</select>
</div>

<div class="mb-4">
<label class="text-gray-400 text-sm">Status</label>
<select name="status" class="w-full bg-gray-800 p-2 rounded">
<option value="1">Active</option>
<option value="0">Inactive</option>
</select>
</div>

<div class="flex justify-end gap-3">
<button type="button" id="cancelEditUserModal" class="bg-gray-600 px-4 py-2 rounded">Cancel</button>
<button type="submit" class="bg-blue-600 px-4 py-2 rounded">Update</button>
</div>

</form>
</div>
</div>
