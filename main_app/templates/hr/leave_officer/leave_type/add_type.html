<!-- ===================================================== -->
<!-- CREATE MODAL -->
<!-- ===================================================== -->

<div id="createModal"
     class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">

<div class="bg-gray-800 p-6 rounded-2xl w-full max-w-md space-y-4">

<h2 class="text-xl font-semibold text-blue-400">Create Leave Type</h2>

<form method="POST" action="{{ url_for('leave_officer_bp.create_leave_type') }}" class="space-y-4">

<input name="name"
       placeholder="Leave Type Name"
       required
       class="w-full bg-gray-700 text-white px-3 py-2 rounded-lg">

<textarea name="description"
          placeholder="Description"
          class="w-full bg-gray-700 text-white px-3 py-2 rounded-lg"></textarea>

<div class="flex justify-end gap-3">
    <button type="button"
            onclick="closeCreateModal()"
            class="bg-gray-600 px-4 py-2 rounded-lg">
        Cancel
    </button>

    <button class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg">
        Save
    </button>
</div>

</form>
</div>
</div>
