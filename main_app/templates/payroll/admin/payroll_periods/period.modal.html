<!-- ===== PAYROLL PERIOD MODAL ===== -->
<div id="periodModal"
     class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">

  <div class="bg-gray-800 w-full max-w-lg rounded-2xl border border-gray-700 shadow-2xl">

    <!-- HEADER -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700">
      <h2 id="modalTitle" class="text-lg font-semibold text-emerald-400">
        Add Payroll Period
      </h2>

      <button onclick="closePeriodModal()"
              class="text-gray-400 hover:text-white text-xl">
        &times;
      </button>
    </div>

    <!-- BODY -->
    <form id="periodForm" method="POST">
      <div class="p-6 space-y-4">

        <!-- START DATE -->
        <div>
          <label class="block text-sm text-gray-400 mb-1">Start Date</label>
          <input type="date"
                 name="start_date"
                 id="start_date"
                 required
                 class="w-full px-3 py-2 rounded-lg bg-gray-900 border border-gray-700 text-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none">
        </div>

        <!-- END DATE -->
        <div>
          <label class="block text-sm text-gray-400 mb-1">End Date</label>
          <input type="date"
                 name="end_date"
                 id="end_date"
                 required
                 class="w-full px-3 py-2 rounded-lg bg-gray-900 border border-gray-700 text-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none">
        </div>

        <!-- STATUS -->
        <div>
          <label class="block text-sm text-gray-400 mb-1">Status</label>
          <select name="status"
                  id="status"
                  class="w-full px-3 py-2 rounded-lg bg-gray-900 border border-gray-700 text-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none">
            <option value="Open">Open</option>
            <option value="Closed">Closed</option>
          </select>
        </div>

      </div>

      <!-- FOOTER -->
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-700">
        <button type="button"
                onclick="closePeriodModal()"
                class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-lg text-white text-sm transition">
          Cancel
        </button>

        <button type="submit"
                class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-white text-sm transition">
          Save
        </button>
      </div>
    </form>

  </div>
</div>
